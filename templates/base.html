<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalanda IIT Olympiad School - Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Nalanda Admin</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item active" onclick="loadModule('dashboard', this)">
                    <i class="fas fa-chart-line"></i> Dashboard
                </li>
                <li class="menu-item" onclick="loadModule('students', this)">
                    <i class="fas fa-user-graduate"></i> Students
                </li>
                <li class="menu-item" onclick="loadModule('staff', this)">
                    <i class="fas fa-chalkboard-teacher"></i> Staff
                </li>
                <li class="menu-item" onclick="loadModule('register', this)">
                    <i class="fas fa-user-plus"></i> Register
                </li>
                <li class="menu-item" onclick="loadModule('transport', this)">
                    <i class="fas fa-bus"></i> Transport
                </li>
                <li class="menu-item" onclick="loadModule('fees', this)">
                    <i class="fas fa-money-bill-wave"></i> Fees
                </li>
                <li class="menu-item" onclick="loadModule('reports', this)">
                    <i class="fas fa-file-alt"></i> Reports
                </li>
                <li class="menu-item" onclick="loadModule('salary', this)">
                    <i class="fas fa-receipt"></i> Salary slips
                </li>
                <li class="menu-item" onclick="loadModule('approvals', this)">
                    <i class="fas fa-check-circle"></i> Approvals
                </li>
                <li class="menu-item" onclick="loadModule('ledger', this)">
                    <i class="fas fa-book-open"></i> Account Ledger
                </li>
                <li class="menu-item" onclick="loadModule('attendance', this)">
                    <i class="fas fa-calendar-check"></i> Attendance
                </li>
                <li class="menu-item" onclick="loadModule('events', this)">
                    <i class="fas fa-calendar-star"></i> Events
                </li>
                <li class="menu-item" onclick="loadModule('misc', this)">
                    <i class="fas fa-ellipsis-h"></i> Miscellaneous
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="app-header">
                <div class="header-left">
                    <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="School Logo" id="school-logo">
                    <div class="school-name">
                        Nalanda IIT Olympiad School, Narsipatnam
                    </div>
                </div>
                <div class="header-right">
                    <img src="{{ url_for('static', filename='assets/mother.png') }}" alt="Admin" class="mother-img">
                    <a href="{{ url_for('logout') }}" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </header>

            <section id="page-viewport">
                <!-- Content will be loaded here via JS -->
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p>Loading Dashboard...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Load initial module (dashboard)
        window.onload = () => loadModule('dashboard');
    </script>
</body>
</html>
