<div class="mb-2">
    <h2 style="font-weight: 700; color: var(--primary-color);">Registration Portal</h2>
    <p style="color: var(--text-muted);">Add new records to the system database</p>
</div>

<div style="display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; overflow-x: auto;">
    <button class="menu-item-tab active" onclick="showRegTab('student-reg', this)">Register Student</button>
    <button class="menu-item-tab" onclick="showRegTab('staff-reg', this)">Register Staff</button>
    <button class="menu-item-tab" onclick="showRegTab('bus-reg', this)">Register Bus/Route</button>
    <button class="menu-item-tab" onclick="showRegTab('perf-reg', this)">Performance</button>
</div>

<style>
    .menu-item-tab { background: none; border: none; padding: 0.5rem 1rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; font-weight: 500; }
    .menu-item-tab.active { color: var(--accent-color); font-weight: 700; border-bottom: 2px solid var(--accent-color); }
</style>

<div id="reg-form-container">
    <!-- 1. Student Registration -->
    <div id="student-reg" class="data-table-container reg-pane" style="padding: 2.5rem;">
        <h3 class="mb-2">Student Admission Form</h3>
        <form class="form-grid" id="student-reg-form">
            <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" name="Name" required></div>
            <div class="form-group"><label class="form-label">Class-Section</label><input type="text" class="form-control" name="Class" placeholder="e.g. I-A"></div>
            <div class="form-group"><label class="form-label">Father Name</label><input type="text" class="form-control" name="Father Name"></div>
            <div class="form-group"><label class="form-label">Mother Name</label><input type="text" class="form-control" name="Mother Name"></div>
            <div class="form-group"><label class="form-label">Parent Mobile</label><input type="text" class="form-control" name="Parent Mobile"></div>
            <div class="form-group"><label class="form-label">Aadhar</label><input type="text" class="form-control" name="AADHAR"></div>
            <div class="form-group"><label class="form-label">Roll NO</label><input type="text" class="form-control" name="ROLL_NO"></div>
            <div class="form-group"><label class="form-label">Address</label><input type="text" class="form-control" name="ADDRESS"></div>
            <div class="form-group"><label class="form-label">Gender</label>
                <select class="form-control" name="GENDER"><option>Boy</option><option>Girl</option></select>
            </div>
            <div class="form-group"><label class="form-label">Photo URL</label><input type="text" class="form-control" name="PHOTO_URL"></div>
            <div class="form-group"><label class="form-label">Route</label><input type="text" class="form-control" name="Route"></div>
            <div class="form-group"><label class="form-label">Bus No</label><input type="text" class="form-control" name="BusNo"></div>
            
            <div style="grid-column: span 2; margin-top: 1rem;">
                <button type="button" class="primary-btn" onclick="submitRegister('student', 'student-reg-form')">Confirm Registration</button>
            </div>
        </form>
    </div>

    <!-- 2. Staff Registration -->
    <div id="staff-reg" class="data-table-container reg-pane" style="padding: 2.5rem; display:none;">
        <h3 class="mb-2">Staff Registration Form</h3>
        <form class="form-grid" id="staff-reg-form">
            <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-control" name="Name" required></div>
            <div class="form-group"><label class="form-label">Qualification</label><input type="text" class="form-control" name="Qualification"></div>
            <div class="form-group"><label class="form-label">Mobile</label><input type="text" class="form-control" name="Mobile"></div>
            <div class="form-group"><label class="form-label">Salary</label><input type="number" class="form-control" name="Salary"></div>
            <div class="form-group"><label class="form-label">Staff Type</label>
                <select class="form-control" name="StaffType"><option>Teaching</option><option>Non-Teaching</option></select>
            </div>
            <div style="grid-column: span 2;">
                <button type="button" class="primary-btn" onclick="submitRegister('staff', 'staff-reg-form')">Register Staff</button>
            </div>
        </form>
    </div>

    <!-- 3. Bus/Route Registration -->
    <div id="bus-reg" class="data-table-container reg-pane" style="padding: 2.5rem; display:none;">
        <h3 class="mb-2">Transport Registration</h3>
        <form class="form-grid" id="bus-reg-form">
            <div class="form-group"><label class="form-label">Bus Number</label><input type="text" class="form-control" name="BusNumber"></div>
            <div class="form-group"><label class="form-label">Bus Registration</label><input type="text" class="form-control" name="BusReg"></div>
            <div class="form-group"><label class="form-label">Route</label><input type="text" class="form-control" name="Route"></div>
            <div class="form-group"><label class="form-label">Fees</label><input type="number" class="form-control" name="Fees"></div>
            <div style="grid-column: span 2;">
                <button type="button" class="primary-btn" onclick="submitRegister('transport', 'bus-reg-form')">Register Route</button>
            </div>
        </form>
    </div>

    <!-- 4. Performance -->
    <div id="perf-reg" class="data-table-container reg-pane" style="padding: 2.5rem; display:none;">
        <h3 class="mb-2">Assessment Marks Entry</h3>
        <form class="form-grid" id="perf-reg-form">
            <div class="form-group"><label class="form-label">Student Name</label><input type="text" class="form-control" name="Student Name"></div>
            <div class="form-group"><label class="form-label">Assessment</label><input type="text" class="form-control" name="Assessment"></div>
            <div class="form-group"><label class="form-label">Telugu Marks</label><input type="number" class="form-control" name="Telugu Marks"></div>
            <div class="form-group"><label class="form-label">English Marks</label><input type="number" class="form-control" name="English Marks"></div>
            <div class="form-group"><label class="form-label">Maths Marks</label><input type="number" class="form-control" name="Maths Marks"></div>
            <div class="form-group"><label class="form-label">Science Marks</label><input type="number" class="form-control" name="Science Marks"></div>
            <div class="form-group"><label class="form-label">Social Marks</label><input type="number" class="form-control" name="Social Marks"></div>
            <div class="form-group"><label class="form-label">Hindi Marks</label><input type="number" class="form-control" name="Hindi Marks"></div>
            <div class="form-group"><label class="form-label">Computers Marks</label><input type="number" class="form-control" name="Computers Marks"></div>
            <div style="grid-column: span 2;">
                <button type="button" class="primary-btn" onclick="submitRegister('performance', 'perf-reg-form')">Submit Marks</button>
            </div>
        </form>
    </div>
</div>

<script>
    function showRegTab(tabId, el) {
        document.querySelectorAll('.reg-pane').forEach(p => p.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.menu-item-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
</script>
