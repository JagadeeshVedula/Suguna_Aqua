<div class="mb-2">
    <h2 style="font-weight: 700; color: var(--primary-color);">Staff Directory</h2>
    <p style="color: var(--text-muted);">Manage teaching and non-teaching staff records</p>
</div>

<!-- Filters Bar -->
<div class="stat-card" style="margin-bottom: 2rem; border-left: none; padding: 1.25rem;">
    <div class="form-grid" style="grid-template-columns: 1fr 1fr auto;">
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Search Staff</label>
            <input type="text" class="form-control" placeholder="Search by name, qualification..." id="search-staff">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Staff Type</label>
            <select class="form-control" id="staff-type">
                <option value="All">All Types</option>
                <option value="Teaching">Teaching</option>
                <option value="Non-Teaching">Non-Teaching</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 0; display: flex; align-items: flex-end;">
            <button class="primary-btn" onclick="fetchStaff()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
    </div>
</div>

<div class="data-table-container">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Qualification</th>
                <th>Mobile</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="staff-list">
            <!-- Example Data -->
            <tr>
                <td>Mr. Jagadeesh</td>
                <td>M.Tech</td>
                <td>+91 9999988888</td>
                <td>Teaching</td>
                <td style="display: flex; gap: 0.5rem;">
                    <button class="primary-btn" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="assignClass('1')">Assign</button>
                    <button class="primary-btn" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background:#ef4444;" onclick="removeClass('1')">Remove</button>
                    <button class="primary-btn" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background:#64748b;" onclick="showStaffDetails('1')">Details</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
